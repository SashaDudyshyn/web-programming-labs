<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Лабораторна робота №2</title>
</head>
<body>
    <h1>Лабораторна робота №2</h1>
    <p>Відкрийте консоль браузера (F12) для перегляду результатів</p>

    <script>
        let car1 = new Object();
        car1.color = "red";
        car1.maxSpeed = 220;
        car1.driver = new Object();
        car1.driver.name = "Dudyshyn";
        car1.driver.category = "C";
        car1.driver["personal limitations"] = "No driving at night";
        car1.tuning = true;
        car1["number of accidents"] = 0;

        let car2 = {
            color: "blue",
            maxSpeed: 180,
            driver: {
                name: "Dudyshyn",
                category: "B",
                "personal limitations": null
            },
            tuning: false,
            "number of accidents": 2
        };

        car1.drive = function() {
            console.log("I am not driving at night");
        };
        car1.drive();

        car2.drive = function() {
            console.log("I can drive anytime");
        };
        car2.drive();

        function Truck(color, weight, avgSpeed, brand, model) {
            this.color = color;
            this.weight = weight;
            this.avgSpeed = avgSpeed;
            this.brand = brand;
            this.model = model;
            
            this.trip = function() {
                if (!this.driver) {
                    console.log("No driver assigned");
                } else {
                    let nightDriveMsg = this.driver.nightDriving ? "drives at night" : "does not drive at night";
                    console.log("Driver " + this.driver.name + " " + nightDriveMsg + " and has " + this.driver.experience + " years of experience");
                }
            };
        }

        Truck.prototype.AssignDriver = function(name, nightDriving, experience) {
            this.driver = {
                name: name,
                nightDriving: nightDriving,
                experience: experience
            };
        };

        let truck1 = new Truck("white", 5000, 80, "Volvo", "FH16");
        truck1.AssignDriver("Олександр", true, 10);
        
        let truck2 = new Truck("black", 6000, 70, "MAN", "TGX");
        truck2.AssignDriver("Михайло", false, 3);

        truck1.trip();
        truck2.trip();

        class Square {
            constructor(a) {
                this.a = a;
            }
            static help() {
                console.log("Квадрат — правильний чотирикутник, у якого всі сторони рівні і всі кути прямі");
            }
            length() {
                console.log(this.a * 4);
            }
            square() {
                console.log(this.a * this.a);
            }
            info() {
                console.log(`Квадрат: довжини сторін = ${this.a}, ${this.a}, ${this.a}, ${this.a}; кути = 90, 90, 90, 90; сума сторін = ${this.a * 4}; площа = ${this.a * this.a}`);
            }
        }

        class Rectangle extends Square {
            constructor(a, b) {
                super(a);
                this.b = b;
            }
            static help() {
                console.log("Прямокутник — чотирикутник, у якого всі кути прямі, а протилежні сторони рівні");
            }
            length() {
                console.log(2 * (this.a + this.b));
            }
            square() {
                console.log(this.a * this.b);
            }
            info() {
                console.log(`Прямокутник: довжини сторін = ${this.a}, ${this.b}, ${this.a}, ${this.b}; кути = 90, 90, 90, 90; сума сторін = ${2 * (this.a + this.b)}; площа = ${this.a * this.b}`);
            }
        }

        class Rhombus extends Square {
            constructor(a, alpha, beta) {
                super(a);
                this.alpha = alpha;
                this.beta = beta;
            }
            
            get a() { return this._a; }
            set a(value) { this._a = value; }
            
            get alpha() { return this._alpha; }
            set alpha(value) { this._alpha = value; }
            
            get beta() { return this._beta; }
            set beta(value) { this._beta = value; }

            static help() {
                console.log("Ромб — паралелограм, у якого всі сторони рівні");
            }
            length() {
                console.log(4 * this.a);
            }
            square() {
                let area = this.a * this.a * Math.sin(this.alpha * Math.PI / 180);
                console.log(parseFloat(area.toFixed(3)));
            }
            info() {
                let area = this.a * this.a * Math.sin(this.alpha * Math.PI / 180);
                console.log(`Ромб: довжини сторін = ${this.a}, ${this.a}, ${this.a}, ${this.a}; кути = ${this.alpha}, ${this.beta}, ${this.alpha}, ${this.beta}; сума сторін = ${4 * this.a}; площа = ${parseFloat(area.toFixed(3))}`);
            }
        }

        class Parallelogram extends Rectangle {
            constructor(a, b, alpha, beta) {
                super(a, b);
                this.alpha = alpha;
                this.beta = beta;
            }
            static help() {
                console.log("Паралелограм — чотирикутник, у якого протилежні сторони попарно паралельні");
            }
            length() {
                console.log(2 * (this.a + this.b));
            }
            square() {
                let area = this.a * this.b * Math.sin(this.alpha * Math.PI / 180);
                console.log(parseFloat(area.toFixed(3)));
            }
            info() {
                let area = this.a * this.b * Math.sin(this.alpha * Math.PI / 180);
                console.log(`Паралелограм: довжини сторін = ${this.a}, ${this.b}, ${this.a}, ${this.b}; кути = ${this.alpha}, ${this.beta}, ${this.alpha}, ${this.beta}; сума сторін = ${2 * (this.a + this.b)}; площа = ${parseFloat(area.toFixed(3))}`);
            }
        }

        Square.help();
        Rectangle.help();
        Rhombus.help();
        Parallelogram.help();

        let objSquare = new Square(5);
        let objRectangle = new Rectangle(4, 6);
        let objRhombus = new Rhombus(5, 120, 60);
        let objParallelogram = new Parallelogram(4, 8, 150, 30);

        objSquare.info();
        objRectangle.info();
        objRhombus.info();
        objParallelogram.info();

        function Triangular(a = 3, b = 4, c = 5) {
            return { a, b, c };
        }

        let t1 = Triangular();
        let t2 = Triangular(6, 8, 10);
        let t3 = Triangular(7, 24, 25);
        console.log(t1);
        console.log(t2);
        console.log(t3);

        function PiMultiplier(num) {
            return function() {
                return Math.PI * num;
            };
        }

        let piMult1 = PiMultiplier(2);
        let piMult2 = PiMultiplier(2/3);
        let piMult3 = PiMultiplier(0.5);

        console.log(piMult1());
        console.log(piMult2());
        console.log(piMult3());

        function Painter(color) {
            return function(obj) {
                if (obj && obj.type) {
                    console.log(color + ", " + obj.type);
                } else {
                    console.log("No 'type' property occurred!");
                }
            };
        }

        let PaintBlue = Painter("blue");
        let PaintRed = Painter("red");
        let PaintYellow = Painter("yellow");

        let testObj1 = { maxSpeed: 280, type: "Sportcar", color: "magenta" };
        let testObj2 = { type: "Truck", "avg speed": 90, "load capacity": 2400 };
        let testObj3 = { maxSpeed: 180, color: "purple", isCar: true };

        PaintBlue(testObj1);
        PaintRed(testObj2);
        PaintYellow(testObj3);
    </script>
</body>
</html>
