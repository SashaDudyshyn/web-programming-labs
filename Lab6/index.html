<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Lights Out</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #f5f5f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 50px;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            font-size: 1.2em;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 60px);
            grid-template-rows: repeat(5, 60px);
            gap: 5px;
            background-color: #333;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .cell {
            width: 60px;
            height: 60px;
            background-color: #2b2b2b;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
        }
        .cell.on {
            background-color: #f2a900;
            box-shadow: 0 0 15px #f2a900, inset 0 0 10px rgba(255, 255, 255, 0.5);
        }
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
        }
        button {
            padding: 10px 20px;
            font-size: 1em;
            background-color: #444;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #555;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Lights Out</h1>
    </div>

    <div class="stats">
        <div id="targetDisplay">Target: 0</div>
        <div id="movesDisplay">Moves: 0</div>
        <div id="timeDisplay">Time: 0s</div>
    </div>

    <div class="grid" id="gameGrid"></div>

    <div class="controls">
        <button id="restartBtn">Restart Level</button>
        <button id="newGameBtn">New Game</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
